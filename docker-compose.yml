version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - MONGODB_URL=mongodb://db:27017
      - DATABASE_NAME=resume_analyzer
    depends_on:
      - db
    volumes:
      - ./backend/app:/app/app
      
  db:
    image: mongo:6.0
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
